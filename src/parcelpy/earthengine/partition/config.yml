# Batch Partition Configuration

# Base path for external storage
base_path: "./data"

# Path Configuration
paths:
  # Input and output directories using paths relative to base_path
  input_state_geoparquet: "nc"  # Example: "nc" for /Users/mihiarc/repos/parcelpy/database/data/nc
  output_county_geoparquet: "nc_counties"  # Example output for counties
  input_state_geojson: "geojson_state"
  output_county_geojson: "geojson_county"
  output_root: "."  # Use base_path as root
  output_dir: "."  # Use base_path as output dir
  counties_dir: "nc_counties"
  logs_dir: "../logs"  # This remains relative to the script directory
  
# Data sources
data_sources:
  shapefile_dir: "tl_2024_us_county"
  shapefile_filename: "tl_2024_us_county.shp"
  gdb_dir: "gdb"  # Directory containing GDB files

# Files and patterns
patterns:
  county_parcel: "{county_file}_parcels.parquet"
  default_county_codes_file: "nc_counties.json"
  gdb_pattern: "SF_Premium_{}.gdb"
  
# Layer configuration
layers:
  default_layer: "ParcelsWithAssessments"

# Constants and column names
constants:
  lightbox_fips_code_column: "FIPS_CODE"
  lightbox_county_name_column: "COUNTY"

# General configuration
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"

# Required packages
deps:
  - geopandas
  - shapely
  - fiona
  - pandas
  - psutil
  
# CRS information
crs:
  source_default: EPSG:4326  # WGS 84 Geographic
  area_default: EPSG:5070    # NAD83 Contiguous USA Albers
  output_default: EPSG:4326  # WGS 84 Geographic

# Processing parameters
processing:
  workers: 4  # Number of worker processes
