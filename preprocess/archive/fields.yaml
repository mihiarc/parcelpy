# North Carolina Standardized Field Definitions
# This file defines standardized field names, descriptions, data types, and general patterns

fields:
  # Parcel Identification
  parcel_id:
    description: "Primary parcel identification number"
    data_type: "string"
    patterns:
      - "(?i)^(parcel|pin|pid|parc|parcelid|pinid|pidnum|parcel_id|pin_id|pid_id|parcel_num)$"
      - "(?i)^(tax_?id|property_?id|prop_?id|tax_?parcel|property_?pin|prop_?pin)$"
    required: true

  # Owner Information
  owner_name:
    description: "Primary owner name"
    data_type: "string"
    patterns:
      - "(?i)^(owner|ownername|owner_name|property_owner|prop_owner|primary_owner)$"
      - "(?i)^(taxpayer|taxpayer_name|name|owner1|ownernme1)$"

  owner_address:
    description: "Owner mailing address"
    data_type: "string"
    patterns:
      - "(?i)^(owner_?addr|mail_?addr|owner_?address|mailing_?address)$"
      - "(?i)^(taxpayer_?addr|addr|address|owner_?mail)$"

  # Property Location
  property_address:
    description: "Physical property address"
    data_type: "string"
    patterns:
      - "(?i)^(prop_?addr|property_?addr|site_?addr|property_?address|site_?address)$"
      - "(?i)^(phys_?addr|physical_?addr|phys_?address|physical_?address|street_?addr)$"

  city:
    description: "Property city"
    data_type: "string"
    patterns:
      - "(?i)^(city|property_?city|prop_?city|site_?city)$"
      - "(?i)^(location_?city|loc_?city)$"

  zip_code:
    description: "Property zip code"
    data_type: "string"
    patterns:
      - "(?i)^(zip|zipcode|zip_?code|postal|postal_?code)$"
      - "(?i)^(property_?zip|prop_?zip|site_?zip)$"

  # Assessment Values
  total_market_value:
    description: "Total market value of the property"
    data_type: "float"
    patterns:
      - "(?i)^(total_?market|market_?value|total_?value|est_?value|estimated_?value)$"
      - "(?i)^(total_?market_?value|tmv|total_val|est_?total_?value)$"

  land_value:
    description: "Assessed land value"
    data_type: "float"
    patterns:
      - "(?i)^(land_?value|land_?val|assessed_?land|land_?assessment)$"
      - "(?i)^(value_?land|val_?land|land_?worth)$"

  building_value:
    description: "Assessed building/improvement value"
    data_type: "float"
    patterns:
      - "(?i)^(building_?value|bldg_?value|improvement_?value|imp_?value)$"
      - "(?i)^(structure_?value|building_?val|bldg_?val|imp_?val)$"

  # Property Characteristics
  acres:
    description: "Parcel size in acres"
    data_type: "float"
    patterns:
      - "(?i)^(acre|acres|acreage|tot_?acre|total_?acre)$"
      - "(?i)^(parcel_?acre|property_?acre|land_?acre|site_?acre)$"

  square_feet:
    description: "Parcel size in square feet"
    data_type: "float"
    patterns:
      - "(?i)^(sq_?ft|sqft|square_?feet|square_?foot|sq_?feet)$"
      - "(?i)^(area_?sqft|lot_?sqft|parcel_?sqft|property_?sqft)$"

  # Land Use
  land_use_code:
    description: "Land use code"
    data_type: "string"
    patterns:
      - "(?i)^(land_?use|landuse|lu_?code|land_?use_?code)$"
      - "(?i)^(use_?code|property_?use|prop_?use|land_?class)$"

  land_use_description:
    description: "Land use description"
    data_type: "string"
    patterns:
      - "(?i)^(land_?use_?desc|landuse_?desc|lu_?desc|land_?use_?description)$"
      - "(?i)^(use_?desc|property_?use_?desc|prop_?use_?desc|land_?class_?desc)$"

  # Tax Information
  tax_district:
    description: "Tax district or jurisdiction"
    data_type: "string"
    patterns:
      - "(?i)^(tax_?district|taxing_?district|district|jurisdiction)$"
      - "(?i)^(tax_?jurisdiction|tax_?area|taxing_?authority)$"

  # Dates
  sale_date:
    description: "Most recent sale date"
    data_type: "date"
    patterns:
      - "(?i)^(sale_?date|sold_?date|transfer_?date|deed_?date)$"
      - "(?i)^(date_?of_?sale|date_?sold|date_?transferred)$"

  sale_price:
    description: "Most recent sale price"
    data_type: "float"
    patterns:
      - "(?i)^(sale_?price|sold_?price|transfer_?price|price)$"
      - "(?i)^(sale_?amount|sold_?amount|transfer_?amount|amount)$"

# Default exclude patterns (fields to generally exclude)
excluded_patterns:
  - "(?i)^(shape|geom|geometry|the_?geom|location|point|poly|polygon|line|multipolygon)$"
  - "(?i)^(objectid|object_?id|oid|fid|feature_?id)$"
  - "(?i)^(gis_?|arcgis_?|esri_?|spatial_?)"
  - "(?i)^(created_?|modified_?|updated_?|edited_?)(by|date|user)$" 