# Streamlit secrets configuration for SocialMapper
# Get your free Census API key at: https://api.census.gov/data/key_signup.html

[census]
api_key = "YOUR_CENSUS_API_KEY_HERE"

# Optional: Database configuration
[database]
# PostgreSQL connection for parcel data
postgres_host = "localhost"
postgres_port = 5432
postgres_database = "parcelpy"
postgres_user = "postgres"

# Optional: SocialMapper configuration
[socialmapper]
cache_dir = "data/cache"
max_workers = 3
default_travel_time = 15 