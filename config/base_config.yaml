# Base configuration for GEE-LCMS project

# Project paths
paths:
  data_dir: "data"
  input_features_dir: "data/input_features"
  ee_output:
    raw_dir: "data/ee_output/raw_gee_output"
    merged_dir: "data/ee_output/merged_gee_output"
    analysis_dir: "data/ee_output/analysis"
  test_data_dir: "tests/data"

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "gee_lcms.log"

# General settings
settings:
  debug_mode: false
  cache_enabled: true
  cache_dir: ".cache"
  max_retries: 3
  timeout_seconds: 300 