# Parcel processing configuration

# Input data settings
input:
  crs: "EPSG:4326"  # WGS84, will be transformed to Web Mercator in Earth Engine
  required_columns:
    - "geometry"
    - "PRCL_NBR"

# Processing settings
processing:
  batch_size: 1000
  max_retries: 3
  timeout_minutes: 30
  parallel_jobs: 4
  chunk_size_mb: 100

# Validation settings
validation:
  min_parcel_area: 1000  # 0.1 hectares
  max_parcel_area: 10000000  # 1000 hectares
  simplify_tolerance: 1.0  # meters
  repair_invalid: true
  remove_duplicates: true

# Output settings
output:
  formats:
    - "parquet"
    - "geojson"
  compress: true
  partition_by:
    - "year"
    - "county" 