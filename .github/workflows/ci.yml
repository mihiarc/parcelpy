name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    services:
      postgres:
        image: postgis/postgis:13-3.1
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parcelpy_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Set up test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d parcelpy_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"
        PGPASSWORD=postgres psql -h localhost -U postgres -d parcelpy_test -c "CREATE EXTENSION IF NOT EXISTS postgis_topology;"
      env:
        PGPASSWORD: postgres

    - name: Run unit tests
      run: |
        uv run python -m pytest tests/unit/ -v --cov=parcelpy --cov-report=xml --cov-report=term-missing
      env:
        PARCELPY_DB_HOST: localhost
        PARCELPY_DB_PORT: 5432
        PARCELPY_DB_NAME: parcelpy_test
        PARCELPY_DB_USER: postgres
        PARCELPY_DB_PASSWORD: postgres

    - name: Run integration tests (if database tests are needed)
      run: |
        uv run python -m pytest tests/integration/ -v -m "not external" --cov=parcelpy --cov-append --cov-report=xml
      env:
        PARCELPY_DB_HOST: localhost
        PARCELPY_DB_PORT: 5432
        PARCELPY_DB_NAME: parcelpy_test
        PARCELPY_DB_USER: postgres
        PARCELPY_DB_PASSWORD: postgres

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --dev

    - name: Run black
      run: uv run black --check parcelpy tests

    - name: Run isort
      run: uv run isort --check-only parcelpy tests

    - name: Run flake8
      run: uv run flake8 parcelpy tests --max-line-length=88 --extend-ignore=E203,W503

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/ 