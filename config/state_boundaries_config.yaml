# Configuration for US state boundaries analysis

# Feature collection for state boundaries
dataset:
  collection_id: "TIGER/2018/States"
  property_id: "STUSPS"  # State USPS code
  name_property: "NAME"  # Full state name

# Properties to extract
properties:
  - "STUSPS"
  - "NAME"
  - "ALAND"  # Land area in square meters
  - "AWATER"  # Water area in square meters

# Processing parameters
processing:
  scale: 30  # Match LCMS resolution
  max_pixels: 1e13
  tile_scale: 4  # For large computations
  
# Output configuration
output:
  folder: "state_analysis"
  filename: "lcms_state_analysis.csv"
  columns:
    - "state_code"
    - "state_name"
    - "total_area_ha"
    - "agriculture_pct"
    - "developed_pct"
    - "forest_pct"
    - "wetland_pct"
    - "other_pct"
    - "rangeland_pct" 